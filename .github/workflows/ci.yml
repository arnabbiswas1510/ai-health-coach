name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        shell: bash
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Pixi version
        run: pixi --version

      - name: Install dependencies
        run: pixi install -q

      - name: Install dependencies
        run: pixi install -q

      - name: Lint (ruff)
        run: pixi run lint-ruff
        continue-on-error: true

      - name: Type Check (mypy)
        run: pixi run type-check
        continue-on-error: true

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: "sk-ant-TEST"
          OPENAI_API_KEY: "sk-TEST"
          LOGSEQ_HOST: "http://localhost:3001"   # dummy — no real Logseq in CI
          LOGSEQ_API_TOKEN: "ci-test-token"
        run: pixi run test
