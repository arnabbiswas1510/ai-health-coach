name: Deploy to Production Server

on:
  workflow_run:
    workflows: ["Publish Docker Image"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Debug secrets
        run: |
          HOST="${{ secrets.DEPLOY_HOST }}"
          if [ -z "$HOST" ]; then
            echo "DEPLOY_HOST is empty!"
          else
            echo "DEPLOY_HOST is set! Length: ${#HOST}"
            if [[ "$HOST" =~ [[:space:]] ]]; then
              echo "WARNING: DEPLOY_HOST contains whitespace!"
            fi
            if [[ "$HOST" =~ ^http ]]; then
              echo "WARNING: DEPLOY_HOST contains http/https prefix!"
            fi
          fi

          USER="${{ secrets.DEPLOY_USER }}"
          if [ -z "$USER" ]; then
            echo "DEPLOY_USER is empty!"
          else
            echo "DEPLOY_USER is set! Length: ${#USER}"
          fi

          KEY="${{ secrets.DEPLOY_KEY }}"
          if [ -z "$KEY" ]; then
            echo "DEPLOY_KEY is empty!"
          else
            echo "DEPLOY_KEY is set! Length: ${#KEY}"
          fi
      - name: Deploy new images to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 2222
          timeout: 120s
          debug: true
          script: |
            cd /home/dietpi/docker/garmin-ai-coach

            echo "=== Pulling latest repository code ==="
            git fetch --all
            git reset --hard origin/main

            echo "=== Pulling latest ai-health-coach image ==="
            docker compose pull ai-health-coach

            echo "=== Removing old container instance to prevent name conflict ==="
            docker compose rm -fs ai-health-coach

            echo "=== Restarting ai-health-coach ==="
            docker compose up -d ai-health-coach > /dev/null 2>&1

            echo "=== Deployment complete ==="
            docker inspect ai-health-coach --format 'ai-health-coach: {{.State.Status}} (restarts: {{.RestartCount}})'
            exit 0
