# Garmin AI CLI Configuration
athlete:
  name: "Arnab"
  email: "arnabbiswas@yahoo.com"  # Garmin Connect email
  age: 53                        # Athlete age (used for estimating Max HR and Zone 2 boundaries)
  target_goal: "base_building"   # Training goal: e.g., "base_building", "maintenance"
  sync_calendar: false            # Set to true to automatically sync the 28-day AI plan to your Garmin Calendar/watch
  missed_runs_count: 0           # Count of missed runs to trigger adaptive training adjustments
  accumulated_debt_km: 0.0       # Accumulated mileage debt carried forward (km)
  height: "5'9\""                # Athlete height (Golden source is Garmin Connect, fallback to this value if unset)
  weight: null                   # Current athlete weight in kg (Golden source is Garmin scale metrics, fallback to this if unset)
  weight_goal: "weight_loss"     # Weight management preference: "maintain_lower_healthy_range" or "weight_loss"
  zone2_min: null                 # Custom Zone 2 HR low limit (beats per minute) to allow comfortable jogging
  zone2_max: null                 # Custom Zone 2 HR high limit (beats per minute) to allow comfortable jogging

# Analysis Context
context:
  analysis: |
    Goal is to lose weight down to 160 lbs. Currently focus on base building and running adaptation. 
    Struggle to stay in Zone 2 while running (heart rate spikes to Zone 3/4).
    Suggest structured walk-run intervals to help build the aerobic base and fat oxidation.

  planning: |
    Focusing on building aerobic capacity, cardiovascular fitness, and caloric expenditure.
    Target weight: 160 lbs.
    Adjust run workouts with run-walk intervals to keep heart rate in Zone 2.

# Data Extraction Settings
extraction:
  activities_days: 90      # Extract last 90 days of activities (3 months)
  metrics_days: 14         # Extract last 14 days of metrics (prevents API rate limits/timeouts)
  ai_mode: "pro"
  enable_plotting: false   # Disable plots to save cost/time
  hitl_enabled: false      # Disable human-in-the-loop in docker non-interactive mode
  skip_synthesis: false    # Generate complete weekly plans

# Output Settings
output:
  directory: "./data"

# Workout of the Day (WOTD) Settings
# Triggered each morning when overnight sleep data arrives from Garmin.
# Generates exactly one AI-designed workout and pushes it to Garmin Connect,
# replacing any previously pushed WOTD to prevent watch errors.
workout_of_the_day:
  enabled: true
  target_weight_lbs: 160           # Weight loss goal (passed to AI for context)
  weekday_max_duration_min: 60     # Hard cap Mon-Fri (you can only run 1h on work days)
  weekend_max_duration_min: 105    # Allow longer runs Sat-Sun
  recent_runs_count: 10            # Number of recent runs to include in weighted baseline
  decay_factor: 0.85               # Recency decay: last run ~6x weight of oldest in window
  push_to_garmin: true             # Set to false to log only (dry-run) without pushing to watch

