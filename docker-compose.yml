services:
  coach:
    build: .
    image: ghcr.io/arnabbiswas1510/garmin-ai-coach:latest
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GARMIN_EMAIL=${GARMIN_EMAIL:-}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - AI_MODE=${AI_MODE:-cost_effective}
      - ATHLETE_NAME=${ATHLETE_NAME:-}
      - ATHLETE_AGE=${ATHLETE_AGE:-53}
      - TARGET_GOAL=${TARGET_GOAL:-base_building}
      - SYNC_CALENDAR=${SYNC_CALENDAR:-false}
      - MISSED_RUNS_COUNT=${MISSED_RUNS_COUNT:-0}
      - ACCUMULATED_DEBT_KM=${ACCUMULATED_DEBT_KM:-0.0}
      - ATHLETE_HEIGHT=${ATHLETE_HEIGHT:-}
      - ATHLETE_WEIGHT=${ATHLETE_WEIGHT:-}
      - WEIGHT_GOAL=${WEIGHT_GOAL:-}
      - CONTEXT_ANALYSIS=${CONTEXT_ANALYSIS:-}
      - CONTEXT_PLANNING=${CONTEXT_PLANNING:-}
      - ACTIVITIES_DAYS=${ACTIVITIES_DAYS:-7}
      - METRICS_DAYS=${METRICS_DAYS:-14}
      - ENABLE_PLOTTING=${ENABLE_PLOTTING:-false}
      - HITL_ENABLED=${HITL_ENABLED:-true}
      - SKIP_SYNTHESIS=${SKIP_SYNTHESIS:-false}
      - OUTPUT_DIR=${OUTPUT_DIR:-./data}
      - COMPETITIONS=${COMPETITIONS:-}
    volumes:
      - ./tokens:/app/tokens
      - ./data:/app/data
      - ./coach_config.yaml:/app/coach_config.yaml
    command: ["--config", "/app/coach_config.yaml"]

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./data:/usr/share/nginx/html

  poller-daemon:
    build: .
    image: ghcr.io/arnabbiswas1510/garmin-ai-coach:latest
    container_name: garmin-ai-coach-poller-daemon
    restart: always
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GARMIN_EMAIL=${GARMIN_EMAIL:-}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - AI_MODE=${AI_MODE:-cost_effective}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-3600}
      - ATHLETE_NAME=${ATHLETE_NAME:-}
      - ATHLETE_AGE=${ATHLETE_AGE:-53}
      - TARGET_GOAL=${TARGET_GOAL:-base_building}
      - SYNC_CALENDAR=${SYNC_CALENDAR:-false}
      - MISSED_RUNS_COUNT=${MISSED_RUNS_COUNT:-0}
      - ACCUMULATED_DEBT_KM=${ACCUMULATED_DEBT_KM:-0.0}
      - ATHLETE_HEIGHT=${ATHLETE_HEIGHT:-}
      - ATHLETE_WEIGHT=${ATHLETE_WEIGHT:-}
      - WEIGHT_GOAL=${WEIGHT_GOAL:-}
      - CONTEXT_ANALYSIS=${CONTEXT_ANALYSIS:-}
      - CONTEXT_PLANNING=${CONTEXT_PLANNING:-}
      - ACTIVITIES_DAYS=${ACTIVITIES_DAYS:-7}
      - METRICS_DAYS=${METRICS_DAYS:-14}
      - ENABLE_PLOTTING=${ENABLE_PLOTTING:-false}
      - HITL_ENABLED=${HITL_ENABLED:-true}
      - SKIP_SYNTHESIS=${SKIP_SYNTHESIS:-false}
      - OUTPUT_DIR=${OUTPUT_DIR:-./data}
      - COMPETITIONS=${COMPETITIONS:-}
    volumes:
      - ./tokens:/app/tokens
      - ./data:/app/data
      - ./coach_config.yaml:/app/coach_config.yaml
    entrypoint: ["python", "-u", "daemon.py"]



