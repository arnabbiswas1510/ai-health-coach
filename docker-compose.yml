services:
  coach:
    build: .
    image: ghcr.io/arnabbiswas1510/garmin-ai-coach:latest
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - AI_MODE=${AI_MODE:-cost_effective}
    volumes:
      - ./tokens:/app/tokens
      - ./data:/app/data
      - ./coach_config.yaml:/app/coach_config.yaml
    command: ["--config", "/app/coach_config.yaml"]

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./data:/usr/share/nginx/html

  poller-daemon:
    build: .
    image: ghcr.io/arnabbiswas1510/garmin-ai-coach:latest
    container_name: garmin-ai-coach-poller-daemon
    restart: always
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - AI_MODE=${AI_MODE:-cost_effective}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-3600}
    volumes:
      - ./tokens:/app/tokens
      - ./data:/app/data
      - ./coach_config.yaml:/app/coach_config.yaml
    entrypoint: ["python", "-u", "daemon.py"]



