# =============================================================================
# docker-compose.yml
# =============================================================================
# Usage:
#   docker compose up -d        # pulls ghcr.io/arnabbiswas1510/ai-health-coach:latest
#
# On every `up`, the container automatically:
#   1. Deletes stale HTML artifacts
#   2. Runs the AI coach analysis (aborts with clear error if it fails)
#   3. Starts nginx (dashboard on port 8085)
#   4. Starts the chat-api (feedback panel on port 8001)
#   5. Starts the Garmin poller daemon (re-runs analysis on new activities)
# =============================================================================


services:
  ai-health-coach:
    image: ghcr.io/arnabbiswas1510/ai-health-coach:latest
    entrypoint: ["/app/startup.sh"]
    container_name: ai-health-coach
    restart: unless-stopped
    ports:
      - "8085:80" # Dashboard (nginx)
      - "8001:8001" # Chat API  (optional direct access)
    environment:
      # в”Ђв”Ђ LLM Keys в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # в”Ђв”Ђ Garmin Credentials в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      # в”Ђв”Ђ AI Mode в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - AI_MODE=${AI_MODE:-cost_effective}
      # в”Ђв”Ђ Athlete Profile в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ATHLETE_NAME=${ATHLETE_NAME:-}
      - ATHLETE_AGE=${ATHLETE_AGE:-53}
      - TARGET_GOAL=${TARGET_GOAL:-base_building}
      - ATHLETE_HEIGHT=${ATHLETE_HEIGHT:-}
      - ATHLETE_WEIGHT=${ATHLETE_WEIGHT:-}
      - WEIGHT_GOAL=${WEIGHT_GOAL:-}
      # в”Ђв”Ђ Training Context в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - CONTEXT_ANALYSIS=${CONTEXT_ANALYSIS:-}
      - CONTEXT_PLANNING=${CONTEXT_PLANNING:-}
      - ACTIVITIES_DAYS=${ACTIVITIES_DAYS:-7}
      - METRICS_DAYS=${METRICS_DAYS:-14}
      - MISSED_RUNS_COUNT=${MISSED_RUNS_COUNT:-0}
      - ACCUMULATED_DEBT_KM=${ACCUMULATED_DEBT_KM:-0.0}
      - COMPETITIONS=${COMPETITIONS:-}
      # в”Ђв”Ђ Feature Flags в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - SYNC_CALENDAR=${SYNC_CALENDAR:-false}
      - ENABLE_PLOTTING=${ENABLE_PLOTTING:-false}
      - HITL_ENABLED=${HITL_ENABLED:-true}
      - SKIP_SYNTHESIS=${SKIP_SYNTHESIS:-false}
      - FORCE_ANALYTICS=${FORCE_ANALYTICS:-false}
      # в”Ђв”Ђ Logseq Integration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - LOGSEQ_HOST=${LOGSEQ_HOST:-http://192.168.1.80:12315}
      - LOGSEQ_API_TOKEN=${LOGSEQ_API_TOKEN:-}
      # в”Ђв”Ђ Paths & Daemon в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - OUTPUT_DIR=/app/data
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-3600}
    volumes:
      - ./tokens:/app/tokens # Garmin auth tokens (persisted)
      - ./data:/app/data # Generated HTML + JSON (persisted)
      - ./coach_config.yaml:/app/coach_config.yaml # Athlete config
