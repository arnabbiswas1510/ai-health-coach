# nginx config for single-container (NAS) deployment
# Difference from nginx.conf: /api/ proxies to 127.0.0.1:8001 (localhost)
# instead of http://chat-api:8001 (separate Docker hostname).

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Suppress version in error pages and headers
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # Serve generated HTML/JSON from shared data volume
        root /usr/share/nginx/html;
        index index.html planning.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # Proxy /api/ → local uvicorn instance (same container, port 8001)
        location /api/ {
            proxy_pass         http://127.0.0.1:8001/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
